externalHost: host.minikube.internal

replicaCount:
  api: 2
  anomalyService: 2
  notificationWorker: 2

image:
  registry: ""          
  pullPolicy: IfNotPresent

api:
  image: app-boiler-telemetry-api:latest
  port: 8080
  resources:
    requests:
      cpu: "100m"
      memory: "192Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70
  pdb:
    enabled: true
    minAvailable: 1

anomalyService:
  image: app-anomaly-service:latest
  port: 8080
  resources:
    requests:
      cpu: "100m"
      memory: "192Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70
  pdb:
    enabled: true
    minAvailable: 1

notificationWorker:
  image: app-notification-worker:latest
  port: 8080
  resources:
    requests:
      cpu: "100m"
      memory: "192Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 4
    targetCPUUtilizationPercentage: 70
  pdb:
    enabled: true
    minAvailable: 1

# ── Подключение к БД (хостится снаружи в Docker) ──────────────────────────────
externalDatabases:
  postgres:
    host: postgres   # ExternalName-сервис → externalHost
    port: 25432      # переопределяется --set из .env: POSTGRES_HOST_PORT
    database: ""     # из .env: POSTGRES_DB
    user: ""         # из .env: POSTGRES_USER
    password: ""     # из .env: POSTGRES_PASSWORD
  influx:
    url: http://influxdb:28086
    port: 28086
    token: ""        # из .env: INFLUX_ADMIN_TOKEN
    org: ""          # из .env: INFLUX_ORG
    bucket: ""       # из .env: INFLUX_BUCKET

# Redis
redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: false
  master:
    persistence:
      enabled: false

# PostgreSQL выключена, тк вынесена в вне кубера
postgresql:
  enabled: false

# Kafka
kafka:
  enabled: true
  replicaCount: 1
  persistence:
    enabled: false
  kraft:
    enabled: true
  listeners:
    client:
      protocol: PLAINTEXT
  provisioning:
    enabled: true
    topics:
      - name: telemetry-events
        partitions: 3
        replicationFactor: 1
      - name: anomaly-events
        partitions: 3
        replicationFactor: 1

# OpenSearch
opensearch:
  enabled: true
  image: opensearchproject/opensearch:2.15.0
  javaOpts: "-Xms512m -Xmx512m"
  resources:
    requests:
      cpu: "200m"
      memory: "768Mi"
    limits:
      cpu: "1000m"
      memory: "1Gi"

opensearchDashboards:
  enabled: true
  image: opensearchproject/opensearch-dashboards:2.15.0
  resources:
    requests:
      cpu: "100m"
      memory: "384Mi"
    limits:
      cpu: "500m"
      memory: "768Mi"

# Jaeger
jaeger:
  enabled: true
  image: jaegertracing/all-in-one:1.60
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

# Prometheus
prometheus:
  enabled: true
  image: prom/prometheus:v2.55.0
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "768Mi"

# Kafka UI
kafkaUi:
  enabled: true
  image: provectuslabs/kafka-ui:latest
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

# Grafana
grafana:
  enabled: true
  image: grafana/grafana:11.2.0
  resources:
    requests:
      cpu: "100m"
      memory: "192Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

# nginx ingress
nginx:
  enabled: true

ingress:
  enabled: true
  host: boiler-telemetry.local
