# Хост, на котором крутится Docker с БД (postgres + influxdb).
# Для minikube это host.minikube.internal, для Docker Desktop K8s — host.docker.internal.
externalHost: host.minikube.internal

replicaCount:
  api: 2
  anomalyService: 2
  notificationWorker: 2

image:
  registry: ""           # пусто = локальные образы из minikube
  pullPolicy: IfNotPresent

api:
  image: app-boiler-telemetry-api:latest
  port: 8080
  resources:
    requests:
      cpu: "100m"
      memory: "192Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70
  pdb:
    enabled: true
    minAvailable: 1

anomalyService:
  image: app-anomaly-service:latest
  port: 8080
  resources:
    requests:
      cpu: "100m"
      memory: "192Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70
  pdb:
    enabled: true
    minAvailable: 1

notificationWorker:
  image: app-notification-worker:latest
  port: 8080
  resources:
    requests:
      cpu: "100m"
      memory: "192Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 4
    targetCPUUtilizationPercentage: 70
  pdb:
    enabled: true
    minAvailable: 1

# ── Подключение к БД (хостится снаружи в Docker) ──────────────────────────────
externalDatabases:
  postgres:
    host: postgres   # ExternalName-сервис → externalHost
    port: 25432
    database: boiler_telemetry
    user: postgres
    password: postgres
  influx:
    url: http://influxdb:28086
    token: dev-token
    org: boiler-org
    bucket: telemetry

# ── Redis (bitnami subchart) ──────────────────────────────────────────────────
redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: false
  master:
    persistence:
      enabled: false

# ── PostgreSQL subchart выключен — БД вынесена наружу ─────────────────────────
postgresql:
  enabled: false

# ── Kafka (bitnami subchart) ──────────────────────────────────────────────────
kafka:
  enabled: true
  replicaCount: 1
  persistence:
    enabled: false
  kraft:
    enabled: true
  listeners:
    client:
      protocol: PLAINTEXT
  provisioning:
    enabled: true
    topics:
      - name: telemetry-events
        partitions: 3
        replicationFactor: 1
      - name: anomaly-events
        partitions: 3
        replicationFactor: 1

# ── OpenSearch — централизованное хранилище логов ────────────────────────────
opensearch:
  enabled: true
  image: opensearchproject/opensearch:2.15.0
  javaOpts: "-Xms512m -Xmx512m"
  resources:
    requests:
      cpu: "200m"
      memory: "768Mi"
    limits:
      cpu: "1000m"
      memory: "1Gi"

opensearchDashboards:
  enabled: true
  image: opensearchproject/opensearch-dashboards:2.15.0
  resources:
    requests:
      cpu: "100m"
      memory: "384Mi"
    limits:
      cpu: "500m"
      memory: "768Mi"

# ── Jaeger — трейсинг ─────────────────────────────────────────────────────────
jaeger:
  enabled: true
  image: jaegertracing/all-in-one:1.60
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

# ── Grafana — единый UI для логов (OpenSearch) и трейсов (Jaeger) ───────────
grafana:
  enabled: true
  image: grafana/grafana:11.2.0
  resources:
    requests:
      cpu: "100m"
      memory: "192Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

# ── nginx ingress ─────────────────────────────────────────────────────────────
nginx:
  enabled: true

ingress:
  enabled: true
  host: boiler-telemetry.local
