{{- if .Values.opensearchDashboards.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opensearch-dashboards
  labels:
    app: opensearch-dashboards
spec:
  replicas: 1
  selector:
    matchLabels:
      app: opensearch-dashboards
  template:
    metadata:
      labels:
        app: opensearch-dashboards
    spec:
      initContainers:
        - name: wait-for-opensearch
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z opensearch 9200; do echo waiting for opensearch; sleep 5; done']
      containers:
        - name: opensearch-dashboards
          image: {{ .Values.opensearchDashboards.image }}
          env:
            - name: OPENSEARCH_HOSTS
              value: '["http://opensearch:9200"]'
            - name: DISABLE_SECURITY_DASHBOARDS_PLUGIN
              value: "true"
            - name: SERVER_NAME
              value: "opensearch-dashboards"
          ports:
            - containerPort: 5601
          readinessProbe:
            httpGet:
              path: /api/status
              port: 5601
            initialDelaySeconds: 90
            periodSeconds: 15
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /api/status
              port: 5601
            initialDelaySeconds: 240
            periodSeconds: 30
            failureThreshold: 10
          resources:
            {{- toYaml .Values.opensearchDashboards.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: opensearch-dashboards
spec:
  type: NodePort
  selector:
    app: opensearch-dashboards
  ports:
    - port: 5601
      targetPort: 5601
      nodePort: 30601
{{- end }}
