{{- if .Values.opensearchDashboards.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: opensearch-dashboards-config
  labels:
    app: opensearch-dashboards
data:
  opensearch_dashboards.yml: |
    server.host: "0.0.0.0"
    server.name: "opensearch-dashboards"
    opensearch.hosts: ["http://opensearch:9200"]
    opensearch.ssl.verificationMode: none
    # Отключаем фичу workspace — иначе Discover не видит index pattern, созданные через UI
    workspace.enabled: false
    home.disableWelcomeScreen: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opensearch-dashboards
  labels:
    app: opensearch-dashboards
spec:
  replicas: 1
  selector:
    matchLabels:
      app: opensearch-dashboards
  template:
    metadata:
      labels:
        app: opensearch-dashboards
    spec:
      initContainers:
        - name: wait-for-opensearch
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z opensearch 9200; do echo waiting for opensearch; sleep 5; done']
        # Копируем конфиг в writable emptyDir — entrypoint Dashboards дописывает туда строки,
        # поэтому ConfigMap-mount с readOnly=true падает с "Read-only file system".
        - name: copy-config
          image: busybox:1.36
          command: ['sh', '-c', 'cp /cm/opensearch_dashboards.yml /config/opensearch_dashboards.yml && chmod 644 /config/opensearch_dashboards.yml']
          volumeMounts:
            - name: config-cm
              mountPath: /cm
            - name: config
              mountPath: /config
      containers:
        - name: opensearch-dashboards
          image: {{ .Values.opensearchDashboards.image }}
          env:
            - name: DISABLE_SECURITY_DASHBOARDS_PLUGIN
              value: "true"
          ports:
            - containerPort: 5601
          volumeMounts:
            - name: config
              mountPath: /usr/share/opensearch-dashboards/config/opensearch_dashboards.yml
              subPath: opensearch_dashboards.yml
          readinessProbe:
            httpGet:
              path: /api/status
              port: 5601
            initialDelaySeconds: 90
            periodSeconds: 15
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /api/status
              port: 5601
            initialDelaySeconds: 240
            periodSeconds: 30
            failureThreshold: 10
          resources:
            {{- toYaml .Values.opensearchDashboards.resources | nindent 12 }}
      volumes:
        - name: config-cm
          configMap:
            name: opensearch-dashboards-config
        - name: config
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: opensearch-dashboards
spec:
  type: NodePort
  selector:
    app: opensearch-dashboards
  ports:
    - port: 5601
      targetPort: 5601
      nodePort: 30601
{{- end }}
