apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "boiler-telemetry.fullname" . }}-notification-worker
  labels:
    {{- include "boiler-telemetry.labels" . | nindent 4 }}
    app.kubernetes.io/component: notification-worker
spec:
  replicas: {{ .Values.replicaCount.notificationWorker }}
  selector:
    matchLabels:
      {{- include "boiler-telemetry.selectorLabels" (dict "component" "notification-worker" "root" .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "boiler-telemetry.selectorLabels" (dict "component" "notification-worker" "root" .) | nindent 8 }}
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z postgres 5432; do echo waiting for postgres; sleep 3; done']
        - name: wait-for-kafka
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z kafka-broker 9092; do echo waiting for kafka-broker; sleep 3; done']
        - name: create-kafka-topics
          image: confluentinc/cp-kafka:7.5.0
          command:
            - sh
            - -c
            - |
              kafka-topics --create --if-not-exists --topic telemetry-events --bootstrap-server kafka-broker:9092 --partitions 3 --replication-factor 1 || true
              kafka-topics --create --if-not-exists --topic anomaly-events --bootstrap-server kafka-broker:9092 --partitions 3 --replication-factor 1 || true
              echo "Topics ready"
      containers:
        - name: notification-worker
          image: {{ .Values.notificationWorker.image }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.notificationWorker.port }}
          env:
            - name: ConnectionStrings__PostgreSQL
              value: "Host=postgres;Port=5432;Database=boiler_telemetry;Username=postgres;Password=postgres"
            - name: NotificationWorker__BootstrapServers
              value: "kafka-broker:9092"
            - name: NotificationWorker__ConsumerGroup
              value: "notification-worker-group"
            - name: NotificationWorker__InputTopic
              value: "anomaly-events"
            - name: ASPNETCORE_ENVIRONMENT
              value: "Production"
            - name: Elasticsearch__Url
              value: "http://elasticsearch:9200"
          livenessProbe:
            exec:
              command: ['sh', '-c', 'kill -0 1']
            initialDelaySeconds: 90
            periodSeconds: 15
            failureThreshold: 5
          resources:
            {{- toYaml .Values.notificationWorker.resources | nindent 12 }}
