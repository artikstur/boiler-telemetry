apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "boiler-telemetry.fullname" . }}-notification-worker
  labels:
    {{- include "boiler-telemetry.labels" . | nindent 4 }}
    app.kubernetes.io/component: notification-worker
spec:
  replicas: {{ .Values.replicaCount.notificationWorker }}
  selector:
    matchLabels:
      {{- include "boiler-telemetry.selectorLabels" (dict "component" "notification-worker" "root" .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "boiler-telemetry.selectorLabels" (dict "component" "notification-worker" "root" .) | nindent 8 }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z postgres 25432; do echo waiting for external postgres; sleep 3; done']
        - name: wait-for-kafka
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z kafka 9092; do echo waiting for kafka; sleep 3; done']
        - name: wait-for-topics
          image: apache/kafka:3.7.0
          command: ['sh', '-c', 'until /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --describe --topic anomaly-events >/dev/null 2>&1; do echo waiting for topic anomaly-events; sleep 3; done']
      containers:
        - name: notification-worker
          image: {{ .Values.notificationWorker.image }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.notificationWorker.port }}
            - name: metrics
              containerPort: 9090
          env:
            - name: ConnectionStrings__PostgreSQL
              value: "Host={{ .Values.externalDatabases.postgres.host }};Port={{ .Values.externalDatabases.postgres.port }};Database={{ .Values.externalDatabases.postgres.database }};Username={{ .Values.externalDatabases.postgres.user }};Password={{ .Values.externalDatabases.postgres.password }}"
            - name: NotificationWorker__BootstrapServers
              value: "kafka:9092"
            - name: NotificationWorker__ConsumerGroup
              value: "notification-worker-group"
            - name: NotificationWorker__InputTopic
              value: "anomaly-events"
            - name: ASPNETCORE_ENVIRONMENT
              value: "Production"
            - name: OpenSearch__Url
              value: "http://opensearch:9200"
            - name: Otel__Endpoint
              value: "http://jaeger:4317"
            - name: Otel__ServiceName
              value: "boiler-telemetry-notification"
          livenessProbe:
            exec:
              command: ['sh', '-c', 'kill -0 1']
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 5
          resources:
            {{- toYaml .Values.notificationWorker.resources | nindent 12 }}
