apiVersion: v1
kind: Service
metadata:
  name: {{ include "boiler-telemetry.fullname" . }}-api
  labels:
    {{- include "boiler-telemetry.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  selector:
    {{- include "boiler-telemetry.selectorLabels" (dict "component" "api" "root" .) | nindent 4 }}
  ports:
    - name: http
      port: 8080
      targetPort: {{ .Values.api.port }}
