{{- if .Values.opensearch.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opensearch
  labels:
    app: opensearch
spec:
  replicas: 1
  selector:
    matchLabels:
      app: opensearch
  template:
    metadata:
      labels:
        app: opensearch
    spec:
      initContainers:
        - name: fix-vm-max-map
          image: busybox:1.36
          command: ['sh', '-c', 'sysctl -w vm.max_map_count=262144 || true']
          securityContext:
            privileged: true
      containers:
        - name: opensearch
          image: {{ .Values.opensearch.image }}
          env:
            - name: discovery.type
              value: "single-node"
            - name: DISABLE_SECURITY_PLUGIN
              value: "true"
            - name: DISABLE_INSTALL_DEMO_CONFIG
              value: "true"
            - name: OPENSEARCH_JAVA_OPTS
              value: {{ .Values.opensearch.javaOpts | quote }}
            - name: bootstrap.memory_lock
              value: "false"
            - name: cluster.name
              value: "boiler-telemetry-logs"
            - name: node.name
              value: "opensearch-node1"
          ports:
            - name: http
              containerPort: 9200
            - name: transport
              containerPort: 9600
          readinessProbe:
            httpGet:
              path: /_cluster/health?local=true
              port: 9200
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            tcpSocket:
              port: 9200
            initialDelaySeconds: 180
            periodSeconds: 30
            failureThreshold: 5
          resources:
            {{- toYaml .Values.opensearch.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: opensearch
spec:
  selector:
    app: opensearch
  ports:
    - name: http
      port: 9200
      targetPort: 9200
    - name: transport
      port: 9600
      targetPort: 9600
{{- end }}
