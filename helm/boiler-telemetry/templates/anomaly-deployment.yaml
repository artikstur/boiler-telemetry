apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "boiler-telemetry.fullname" . }}-anomaly-service
  labels:
    {{- include "boiler-telemetry.labels" . | nindent 4 }}
    app.kubernetes.io/component: anomaly-service
spec:
  replicas: {{ .Values.replicaCount.anomalyService }}
  selector:
    matchLabels:
      {{- include "boiler-telemetry.selectorLabels" (dict "component" "anomaly-service" "root" .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "boiler-telemetry.selectorLabels" (dict "component" "anomaly-service" "root" .) | nindent 8 }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      initContainers:
        - name: wait-for-kafka
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z kafka 9092; do echo waiting for kafka; sleep 3; done']
        - name: wait-for-redis
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z redis 6379; do echo waiting for redis; sleep 3; done']
        - name: wait-for-topics
          image: apache/kafka:3.7.0
          command: ['sh', '-c', 'until /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --describe --topic telemetry-events >/dev/null 2>&1 && /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --describe --topic anomaly-events >/dev/null 2>&1; do echo waiting for topics; sleep 3; done']
      containers:
        - name: anomaly-service
          image: {{ .Values.anomalyService.image }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.anomalyService.port }}
            - name: metrics
              containerPort: 9090
          env:
            - name: CrudApiBaseUrl
              value: "http://{{ include "boiler-telemetry.fullname" . }}-api:8080"
            - name: AnomalyService__BootstrapServers
              value: "kafka:9092"
            - name: AnomalyService__ConsumerGroup
              value: "anomaly-service-group"
            - name: AnomalyService__InputTopic
              value: "telemetry-events"
            - name: AnomalyService__OutputTopic
              value: "anomaly-events"
            - name: ConnectionStrings__Redis
              value: "redis:6379"
            - name: ASPNETCORE_ENVIRONMENT
              value: "Production"
            - name: OpenSearch__Url
              value: "http://opensearch:9200"
            - name: Otel__Endpoint
              value: "http://jaeger:4317"
            - name: Otel__ServiceName
              value: "boiler-telemetry-anomaly"
          livenessProbe:
            exec:
              command: ['sh', '-c', 'kill -0 1']
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 5
          resources:
            {{- toYaml .Values.anomalyService.resources | nindent 12 }}
