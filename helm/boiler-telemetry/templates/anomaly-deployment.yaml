apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "boiler-telemetry.fullname" . }}-anomaly-service
  labels:
    {{- include "boiler-telemetry.labels" . | nindent 4 }}
    app.kubernetes.io/component: anomaly-service
spec:
  replicas: {{ .Values.replicaCount.anomalyService }}
  selector:
    matchLabels:
      {{- include "boiler-telemetry.selectorLabels" (dict "component" "anomaly-service" "root" .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "boiler-telemetry.selectorLabels" (dict "component" "anomaly-service" "root" .) | nindent 8 }}
    spec:
      initContainers:
        - name: wait-for-kafka
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z kafka-broker 9092; do echo waiting for kafka-broker; sleep 3; done']
        - name: wait-for-redis
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z redis-master 6379; do echo waiting for redis; sleep 3; done']
        - name: create-kafka-topics
          image: confluentinc/cp-kafka:7.5.0
          command:
            - sh
            - -c
            - |
              kafka-topics --create --if-not-exists --topic telemetry-events --bootstrap-server kafka-broker:9092 --partitions 3 --replication-factor 1 || true
              kafka-topics --create --if-not-exists --topic anomaly-events --bootstrap-server kafka-broker:9092 --partitions 3 --replication-factor 1 || true
              echo "Topics ready"
      containers:
        - name: anomaly-service
          image: {{ .Values.anomalyService.image }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.anomalyService.port }}
          env:
            - name: CrudApiBaseUrl
              value: "http://{{ include "boiler-telemetry.fullname" . }}-api:8080"
            - name: AnomalyService__BootstrapServers
              value: "kafka-broker:9092"
            - name: AnomalyService__ConsumerGroup
              value: "anomaly-service-group"
            - name: AnomalyService__InputTopic
              value: "telemetry-events"
            - name: AnomalyService__OutputTopic
              value: "anomaly-events"
            - name: ConnectionStrings__Redis
              value: "redis-master:6379"
            - name: ASPNETCORE_ENVIRONMENT
              value: "Production"
            - name: Elasticsearch__Url
              value: "http://elasticsearch:9200"
          livenessProbe:
            exec:
              command: ['sh', '-c', 'kill -0 1']
            initialDelaySeconds: 90
            periodSeconds: 15
            failureThreshold: 5
          resources:
            {{- toYaml .Values.anomalyService.resources | nindent 12 }}
