{{- if .Values.grafana.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  labels:
    app: grafana
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        uid: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        editable: true
      - name: OpenSearch-Logs
        uid: OpenSearch-Logs
        type: grafana-opensearch-datasource
        access: proxy
        url: http://opensearch:9200
        jsonData:
          database: "boiler-telemetry-*"
          flavor: opensearch
          version: "2.15.0"
          timeField: "@timestamp"
          dataLinks:
            - field: "fields.TraceId"
              url: ""
              datasourceUid: "Jaeger-Traces"
              urlDisplayLabel: "Открыть trace в Jaeger"
        editable: true
      - name: Jaeger-Traces
        uid: Jaeger-Traces
        type: jaeger
        access: proxy
        url: http://jaeger-ui:16686
        jsonData:
          tracesToLogsV2:
            datasourceUid: "OpenSearch-Logs"
            spanStartTimeShift: "-1m"
            spanEndTimeShift: "1m"
            tags: []
            filterByTraceID: true
            customQuery: true
            query: 'fields.TraceId:"$${__trace.traceId}"'
        editable: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: {{ .Values.grafana.image }}
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: {{ .Values.grafana.adminUser | default "admin" | quote }}
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: {{ .Values.grafana.adminPassword | default "admin" | quote }}
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
            - name: GF_AUTH_ANONYMOUS_ORG_ROLE
              value: "Viewer"
            - name: GF_INSTALL_PLUGINS
              value: "grafana-opensearch-datasource"
          ports:
            - containerPort: 3000
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
              readOnly: true
            - name: dashboards-provider
              mountPath: /etc/grafana/provisioning/dashboards
              readOnly: true
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
              readOnly: true
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 30
          resources:
            {{- toYaml .Values.grafana.resources | nindent 12 }}
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboards-provider
          configMap:
            name: grafana-dashboards-provider
        - name: dashboards
          configMap:
            name: grafana-dashboards
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
spec:
  type: NodePort
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30300
{{- end }}
