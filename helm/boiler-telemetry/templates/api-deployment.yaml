apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "boiler-telemetry.fullname" . }}-api
  labels:
    {{- include "boiler-telemetry.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.replicaCount.api }}
  selector:
    matchLabels:
      {{- include "boiler-telemetry.selectorLabels" (dict "component" "api" "root" .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "boiler-telemetry.selectorLabels" (dict "component" "api" "root" .) | nindent 8 }}
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z postgres 5432; do echo waiting for postgres; sleep 3; done']
        - name: wait-for-redis
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z redis-master 6379; do echo waiting for redis; sleep 3; done']
      containers:
        - name: api
          image: {{ .Values.api.image }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.api.port }}
          env:
            - name: ConnectionStrings__PostgreSQL
              value: "Host=postgres;Port=5432;Database=boiler_telemetry;Username=postgres;Password=postgres"
            - name: ConnectionStrings__Redis
              value: "redis-master:6379"
            - name: InfluxDB__Url
              value: "http://influxdb:8086"
            - name: InfluxDB__Token
              value: {{ .Values.influxdb.adminToken | quote }}
            - name: InfluxDB__Org
              value: {{ .Values.influxdb.org | quote }}
            - name: InfluxDB__Bucket
              value: {{ .Values.influxdb.bucket | quote }}
            - name: Kafka__BootstrapServers
              value: "kafka-broker:9092"
            - name: Kafka__Topic
              value: "telemetry-events"
            - name: ASPNETCORE_ENVIRONMENT
              value: "Production"
            - name: Elasticsearch__Url
              value: "http://elasticsearch:9200"
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.api.port }}
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.api.port }}
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
