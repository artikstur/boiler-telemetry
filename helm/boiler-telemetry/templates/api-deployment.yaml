apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "boiler-telemetry.fullname" . }}-api
  labels:
    {{- include "boiler-telemetry.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.replicaCount.api }}
  selector:
    matchLabels:
      {{- include "boiler-telemetry.selectorLabels" (dict "component" "api" "root" .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "boiler-telemetry.selectorLabels" (dict "component" "api" "root" .) | nindent 8 }}
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z postgres 25432; do echo waiting for external postgres; sleep 3; done']
        - name: wait-for-influx
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z influxdb 28086; do echo waiting for external influxdb; sleep 3; done']
        - name: wait-for-redis
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z redis 6379; do echo waiting for redis; sleep 3; done']
        - name: wait-for-kafka
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z kafka 9092; do echo waiting for kafka; sleep 3; done']
      containers:
        - name: api
          image: {{ .Values.api.image }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.api.port }}
          env:
            - name: ConnectionStrings__PostgreSQL
              value: "Host={{ .Values.externalDatabases.postgres.host }};Port={{ .Values.externalDatabases.postgres.port }};Database={{ .Values.externalDatabases.postgres.database }};Username={{ .Values.externalDatabases.postgres.user }};Password={{ .Values.externalDatabases.postgres.password }}"
            - name: ConnectionStrings__Redis
              value: "redis:6379"
            - name: InfluxDB__Url
              value: {{ .Values.externalDatabases.influx.url | quote }}
            - name: InfluxDB__Token
              value: {{ .Values.externalDatabases.influx.token | quote }}
            - name: InfluxDB__Org
              value: {{ .Values.externalDatabases.influx.org | quote }}
            - name: InfluxDB__Bucket
              value: {{ .Values.externalDatabases.influx.bucket | quote }}
            - name: Kafka__BootstrapServers
              value: "kafka:9092"
            - name: Kafka__Topic
              value: "telemetry-events"
            - name: ASPNETCORE_ENVIRONMENT
              value: "Production"
            - name: OpenSearch__Url
              value: "http://opensearch:9200"
            - name: Otel__Endpoint
              value: "http://jaeger:4317"
            - name: Otel__ServiceName
              value: "boiler-telemetry-api"
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.api.port }}
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.api.port }}
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 6
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
