services:
  boiler-telemetry-api:
    build:
      context: .
      dockerfile: src/BoilerTelemetry.Api/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ConnectionStrings__PostgreSQL=Host=postgres;Port=5432;Database=boiler_telemetry;Username=postgres;Password=postgres
      - InfluxDB__Url=http://influxdb:8086
      - InfluxDB__Token=dev-token
      - InfluxDB__Org=boiler-org
      - InfluxDB__Bucket=telemetry
      - Kafka__BootstrapServers=kafka:9092
      - Kafka__Topic=telemetry-events
    depends_on:
      postgres:
        condition: service_healthy
      influxdb:
        condition: service_healthy
      kafka:
        condition: service_started

  anomaly-service:
    build:
      context: .
      dockerfile: src/BoilerTelemetry.AnomalyService/Dockerfile
    environment:
      - CrudApiBaseUrl=http://boiler-telemetry-api:8080
      - AnomalyService__BootstrapServers=kafka:9092
      - AnomalyService__ConsumerGroup=anomaly-service-group
      - AnomalyService__InputTopic=telemetry-events
      - AnomalyService__OutputTopic=anomaly-events
    depends_on:
      kafka:
        condition: service_started
      boiler-telemetry-api:
        condition: service_started
    deploy:
      replicas: 2

  notification-worker:
    build:
      context: .
      dockerfile: src/BoilerTelemetry.NotificationWorker/Dockerfile
    environment:
      - ConnectionStrings__PostgreSQL=Host=postgres;Port=5432;Database=boiler_telemetry;Username=postgres;Password=postgres
      - NotificationWorker__BootstrapServers=kafka:9092
      - NotificationWorker__ConsumerGroup=notification-worker-group
      - NotificationWorker__InputTopic=anomaly-events
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    deploy:
      replicas: 2

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: boiler_telemetry
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  influxdb:
    image: influxdb:2.7
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: adminpassword
      DOCKER_INFLUXDB_INIT_ORG: boiler-org
      DOCKER_INFLUXDB_INIT_BUCKET: telemetry
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: dev-token
    ports:
      - "8086:8086"
    volumes:
      - influxdb-data:/var/lib/influxdb2
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

volumes:
  postgres-data:
  influxdb-data:
