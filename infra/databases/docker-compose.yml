name: boiler-telemetry-databases


services:
  postgres:
    image: postgres:16-alpine
    container_name: boiler-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB must be set in .env}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER must be set in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    ports:
      - "${POSTGRES_HOST_PORT:-25432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 10

  influxdb:
    image: influxdb:2.7
    container_name: boiler-influxdb
    restart: unless-stopped
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUX_ADMIN_USER:?INFLUX_ADMIN_USER must be set in .env}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUX_ADMIN_PASSWORD:?INFLUX_ADMIN_PASSWORD must be set in .env}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUX_ORG:?INFLUX_ORG must be set in .env}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUX_BUCKET:?INFLUX_BUCKET must be set in .env}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUX_ADMIN_TOKEN:?INFLUX_ADMIN_TOKEN must be set in .env}
    ports:
      - "${INFLUX_HOST_PORT:-28086}:8086"
    volumes:
      - influxdb-data:/var/lib/influxdb2
      - influxdb-config:/etc/influxdb2
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.16.0
    container_name: boiler-postgres-exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
    ports:
      - "9187:9187"
    depends_on:
      postgres:
        condition: service_healthy

  postgres-backup:
    image: prodrigestivill/postgres-backup-local:16
    container_name: boiler-postgres-backup
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_EXTRA_OPTS: "-Z6 --schema=public --blobs"
      SCHEDULE: "@hourly"
      BACKUP_KEEP_DAYS: 7
      BACKUP_KEEP_WEEKS: 4
      BACKUP_KEEP_MONTHS: 6
      HEALTHCHECK_PORT: 8080
    volumes:
      - ./backups/postgres:/backups
    depends_on:
      postgres:
        condition: service_healthy

  influx-backup:
    image: influxdb:2.7
    container_name: boiler-influx-backup
    restart: unless-stopped
    environment:
      INFLUX_TOKEN: ${INFLUX_ADMIN_TOKEN}
    depends_on:
      influxdb:
        condition: service_healthy
    volumes:
      - ./backups/influx:/backups
    entrypoint: ["/bin/sh", "-c"]
    command: |
      'while true; do
         ts=$$(date +%Y-%m-%d-%H-%M);
         echo "[$$(date)] backup -> /backups/$$ts";
         influx backup --host http://influxdb:8086 --token $$INFLUX_TOKEN /backups/$$ts || echo "backup failed";
         ls -1d /backups/*/ 2>/dev/null | sort | head -n -24 | xargs -r rm -rf;
         sleep 3600;
       done'

volumes:
  postgres-data:
  influxdb-data:
  influxdb-config:
